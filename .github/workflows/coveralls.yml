name: Coveralls

on:
  push:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake g++ lcov

    - name: Configure with coverage
      run: cmake -H. -B_build -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage"

    - name: Build
      run: cmake --build _build

    - name: Run tests
      run: |
        cd _build
        ./banking_check
        cd ..

    - name: Collect coverage
      run: |
        lcov --capture --directory . --output-file coverage.info --no-external --ignore-errors mismatch --ignore-errors unused
        lcov --remove coverage.info '*/_build/*' '*/tests/*' '*/usr/*' '*/third-party/*' --output-file coverage.info --ignore-errors mismatch --ignore-errors unused
        lcov --list coverage.info

    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: coverage.info
        github-token: ${{ secrets.GITHUB_TOKEN }}
        flag-name: cpp
        parallel: false
